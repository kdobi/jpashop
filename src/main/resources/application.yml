#spring.application.name=jpashop

spring:
  datasource:
    url: jdbc:h2:tcp://localhost/~/jpashop
    username: sa
    password:
    driver-class-name: org.h2.Driver

#이렇게만 해도 히라리시피가 커넥션 풀 이런걸 스프링 부트가 다 알아서 해줌

  jpa:
    hibernate:
      ddl-auto: create # 자동으로 테이블 만들어주는 모드
    properties:
      hibernate:
#       show_sql: true
        format_sql: true

        # 이런건 스프링 공식 문서에서 찾아보면서 공부할 것..

logging:
  level: # 로그 레벨 정하는 것
    org.hibernate.SQL: debug
    # 하이버 네이트가 남기는 모든 로그가 디버그 모드로 돼서 JPA나 하이버네이트가 생성하는 SQL이 다 보임
    # 위에 있는 show_sql은 System.out에 출력 , 얘는 로거에 출력
    org.hibernate.orm.jdbc.bind: trace
    # (? , ?) 추적하면 이렇게 나오는 쿼리문 뭐지 알려줌

